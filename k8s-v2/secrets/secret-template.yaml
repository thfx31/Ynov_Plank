# =============================================================================
# SECRETS ALGOHIVE - NE PAS COMMITER CE FICHIER EN CLAIR
# =============================================================================
# Ce fichier est un TEMPLATE. Pour générer le SealedSecret :
#
#   1. Installer kubeseal :
#      brew install kubeseal  (ou télécharger le binaire depuis GitHub)
#
#   2. Récupérer le certificat du cluster (une seule fois) :
#      kubeseal --fetch-cert \
#        --controller-name=sealed-secrets-controller \
#        --controller-namespace=kube-system \
#        > pub-cert.pem
#
#   3. Chiffrer ce fichier :
#      kubeseal --format yaml \
#        --cert pub-cert.pem \
#        < secrets/secret-template.yaml \
#        > secrets/sealed-secret.yaml
#
#   4. Commiter UNIQUEMENT sealed-secret.yaml (jamais ce fichier)
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: algohive-secret
  namespace: algohive
  labels:
    app.kubernetes.io/part-of: algohive
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME_WITH_LONG_RANDOM_STRING"
  DEFAULT_PASSWORD: "CHANGE_ME"
  MAIL_PASSWORD: "CHANGE_ME"
  CACHE_PASSWORD: ""
  SECRET_KEY: "CHANGE_ME_WITH_LONG_RANDOM_STRING"
  ADMIN_PASSWORD: "CHANGE_ME"
