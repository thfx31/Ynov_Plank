# =============================================================================
# CE FICHIER EST GÉNÉRÉ PAR kubeseal - voir secrets/secret-template.yaml
# Commande : kubeseal --format yaml --cert pub-cert.pem < secrets/secret-template.yaml > secrets/sealed-secret.yaml
# =============================================================================
# Remplacer ce fichier par le résultat de kubeseal avant de push
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: algohive-secret
  namespace: algohive
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    POSTGRES_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    JWT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    DEFAULT_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    MAIL_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    CACHE_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    SECRET_KEY: REPLACE_WITH_KUBESEAL_OUTPUT
    ADMIN_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: algohive-secret
      namespace: algohive
      labels:
        app.kubernetes.io/part-of: algohive
    type: Opaque
