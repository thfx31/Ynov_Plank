apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Le staging réutilise la prod comme base et surcharge ce qui change
resources:
  - ../production/infrastructure
  - ../production/core
  - ../production/beeapi

# En staging : replicas réduits, resources limits allégées
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: algohive-server
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: server
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "256Mi"
                    cpu: "200m"
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: algohive-db
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "256Mi"
                    cpu: "200m"

commonLabels:
  environment: staging
