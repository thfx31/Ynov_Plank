apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/namespace
  - ../../../base/configmap
  - ../../../base/secrets
  - ../../../base/core/backend
  - ../../../base/core/client
  - ../../../base/core/beehub
  - ingress.yaml

# Tag d'image pour la prod : on épingle des versions précises.
# Remplacer "latest" par un SHA ou tag sémantique pour de la vraie prod.
images:
  - name: ghcr.io/algohive-coding-puzzles/api
    newTag: latest
  - name: ghcr.io/algohive-coding-puzzles/client
    newTag: latest
  - name: ghcr.io/algohive-coding-puzzles/beehub
    newTag: latest

commonLabels:
  environment: production
