apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../base/beeapi

nameSuffix: "-tlse"

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: beeapi-server-tlse
      spec:
        selector:
          matchLabels:
            app: beeapi-server-tlse
        template:
          metadata:
            labels:
              app: beeapi-server-tlse
          spec:
            containers:
              - name: beeapi
                env:
                  - name: SERVER_NAME
                    value: "Ynov-Toulouse"
                  - name: SERVER_DESCRIPTION
                    value: "Server for Ynov Toulouse students"
                volumeMounts:
                  - name: puzzles-storage
                    mountPath: /app/puzzles
            volumes:
              - name: puzzles-storage
                persistentVolumeClaim:
                  claimName: puzzles-pvc-tlse
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: beeapi-server-tlse
      spec:
        selector:
          app: beeapi-server-tlse