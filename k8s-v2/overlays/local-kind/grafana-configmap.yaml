apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-local-config
  namespace: algohive
data:
  GF_SERVER_ROOT_URL: http://localhost:3000
  GF_SERVER_DOMAIN: localhost
  GF_AUTH_DISABLE_LOGIN_FORM: "false"
  GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
  GF_AUTH_GENERIC_OAUTH_NAME: Keycloak SSO
  GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
  GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana-oauth
  GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email roles
  GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://localhost:8003/realms/Grafana/protocol/openid-connect/auth
  GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8082/realms/Grafana/protocol/openid-connect/token
  GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak:8082/realms/Grafana/protocol/openid-connect/userinfo
  GF_AUTH_SIGNOUT_REDIRECT_URL: http://localhost:8003/realms/Grafana/protocol/openid-connect/logout?post_logout_redirect_uri=http%3A%2F%2Flocalhost%3A3000
  GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: preferred_username
  GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: name
  GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
  GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(realm_access.roles[*], 'platform-admin') && 'Admin' || contains(realm_access.roles[*], 'manager') && 'Editor' || 'Viewer'
