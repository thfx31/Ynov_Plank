apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: algohive-monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Sync wave -3 : le monitoring doit être prêt avant l'infra applicative
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "70.4.2"
    helm:
      values: |
        grafana:
          envFromSecret: grafana-oauth-secret
          adminPassword: "changeme"  # A remplacer par un Sealed Secret
          grafana.ini:
            server:
              root_url: https://grafana.algohive.dev
            auth:
              disable_login_form: false
              oauth_auto_login: false
            auth.generic_oauth:
              enabled: true
              name: Keycloak SSO
              allow_sign_up: true
              client_id: grafana-oauth
              client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
              scopes: openid profile email roles
              auth_url: https://keycloak.algohive.dev/realms/Grafana/protocol/openid-connect/auth
              token_url: https://keycloak.algohive.dev/realms/Grafana/protocol/openid-connect/token
              api_url: https://keycloak.algohive.dev/realms/Grafana/protocol/openid-connect/userinfo
              signout_redirect_url: https://keycloak.algohive.dev/realms/Grafana/protocol/openid-connect/logout?post_logout_redirect_uri=https%3A%2F%2Fgrafana.algohive.dev
              login_attribute_path: preferred_username
              name_attribute_path: name
              email_attribute_path: email
              role_attribute_path: contains(realm_access.roles[*], 'platform-admin') && 'Admin' || contains(realm_access.roles[*], 'manager') && 'Editor' || 'Viewer'
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: alb
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/healthcheck-path: /api/health
            hosts:
              - grafana.algohive.dev
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests:
                memory: 512Mi
                cpu: 250m
              limits:
                memory: 1Gi
                cpu: 500m
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # nécessaire pour les CRDs volumineuses du chart
