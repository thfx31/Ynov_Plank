apiVersion: v1
kind: Service
metadata:
  name: algohive-db
  namespace: algohive
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: algohive
spec:
  selector:
    app: algohive-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
