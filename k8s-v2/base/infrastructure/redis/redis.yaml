apiVersion: apps/v1
kind: Deployment
metadata:
  name: algohive-cache
  namespace: algohive
  labels:
    app.kubernetes.io/name: algohive-cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: algohive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: algohive-cache
  template:
    metadata:
      labels:
        app: algohive-cache
        app.kubernetes.io/name: algohive-cache
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          # Redis démarre sans auth par défaut.
          # Pour activer un mot de passe : ajouter --requirepass $(CACHE_PASSWORD)
          command: ["redis-server"]

          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: algohive-cache
  namespace: algohive
  labels:
    app.kubernetes.io/name: algohive-cache
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: algohive
spec:
  selector:
    app: algohive-cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
