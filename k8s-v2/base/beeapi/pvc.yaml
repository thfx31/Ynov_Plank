apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: puzzles-pvc
  namespace: algohive
  labels:
    app.kubernetes.io/name: beeapi-server
    app.kubernetes.io/component: catalog
    app.kubernetes.io/part-of: algohive
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
  # Sur EKS, on utilise gp2 (par défaut) ou gp3 (recommandé pour les perfs).
  storageClassName: gp2
