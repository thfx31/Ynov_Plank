# ============================================================
# SEALED SECRET — algohive-secret
# ============================================================
# Ce fichier est le SECRET CHIFFRÉ, sûr à commiter dans Git.
# Il a été généré par la commande :
#
#   kubectl create secret generic algohive-secret \
#     --namespace algohive \
#     --from-literal=POSTGRES_PASSWORD='<mot_de_passe>' \
#     --from-literal=JWT_SECRET='<secret_jwt_fort>' \
#     --from-literal=DEFAULT_PASSWORD='<mdp_default>' \
#     --from-literal=MAIL_PASSWORD='<mdp_smtp>' \
#     --from-literal=CACHE_PASSWORD='' \
#     --from-literal=SECRET_KEY='<cle_secrete>' \
#     --from-literal=ADMIN_PASSWORD='<mdp_admin>' \
#     --dry-run=client -o yaml | \
#   kubeseal \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     --format yaml > sealed-secret.yaml
#
# ⚠️  NE JAMAIS commiter le Secret K8s brut (secret.yaml).
#     Toujours commiter uniquement ce SealedSecret.
# ============================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: algohive-secret
  namespace: algohive
  annotations:
    # cluster-wide : ce secret ne peut être déchiffré que par le
    # contrôleur Sealed Secrets de CE cluster
    sealedsecrets.bitnami.com/cluster-wide: "false"
spec:
  encryptedData:
    # ⚠️  Ces valeurs sont des PLACEHOLDERS.
    #     Tu dois régénérer ce fichier avec kubeseal sur ton cluster EKS.
    #     Voir le README pour la procédure complète.
    POSTGRES_PASSWORD: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    JWT_SECRET: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    DEFAULT_PASSWORD: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    MAIL_PASSWORD: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    CACHE_PASSWORD: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    SECRET_KEY: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
    ADMIN_PASSWORD: PLACEHOLDER_CHIFFRER_AVEC_KUBESEAL
  template:
    metadata:
      name: algohive-secret
      namespace: algohive
    type: Opaque
