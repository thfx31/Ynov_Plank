apiVersion: apps/v1
kind: Deployment
metadata:
  # Le nom sera surchargé par chaque overlay via namePrefix ou patches
  name: beeapi-server
  namespace: algohive
  labels:
    app.kubernetes.io/name: beeapi
    app.kubernetes.io/component: puzzle-catalog
    app.kubernetes.io/part-of: algohive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beeapi-server
  template:
    metadata:
      labels:
        app: beeapi-server
        app.kubernetes.io/name: beeapi
        app.kubernetes.io/component: puzzle-catalog
    spec:
      containers:
        - name: beeapi
          image: ghcr.io/algohive-coding-puzzles/beeapi-go:latest
          ports:
            - containerPort: 5000
          env:
            - name: SERVER_NAME
              # Surchargé dans chaque overlay
              value: "default"
          volumeMounts:
            - name: puzzles-storage
              mountPath: /app/puzzles
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: puzzles-storage
          persistentVolumeClaim:
            claimName: puzzles-pvc
