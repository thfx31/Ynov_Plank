apiVersion: apps/v1
kind: Deployment
metadata:
  name: algohive-client
  namespace: algohive
  labels:
    app.kubernetes.io/name: client
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: algohive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: algohive-client
  template:
    metadata:
      labels:
        app: algohive-client
        app.kubernetes.io/name: client
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: client
          image: ghcr.io/algohive-coding-puzzles/client:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
