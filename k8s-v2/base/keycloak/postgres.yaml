apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-db
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: keycloak
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: keycloak-db
  template:
    metadata:
      labels:
        app: keycloak-db
        app.kubernetes.io/name: keycloak-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: keycloak
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: keycloak-db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: keycloak-db-storage
          persistentVolumeClaim:
            claimName: keycloak-db-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-db
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: keycloak
spec:
  selector:
    app: keycloak-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-db-data-pvc
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
