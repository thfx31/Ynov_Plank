apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: algohive
data:
  KC_DB_NAME: "keycloak"
  KC_DB_USERNAME: "keycloak"
  KC_DB_HOST: "keycloak-db"
  KC_DB_PORT: "5432"
  KC_HOSTNAME: "keycloak.algohive.dev"
