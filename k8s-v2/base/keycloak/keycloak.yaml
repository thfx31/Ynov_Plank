apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: iam
    app.kubernetes.io/part-of: algohive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: iam
        app.kubernetes.io/part-of: algohive
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.5.3
          args:
            - start
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            - name: management
              containerPort: 9002
              protocol: TCP
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_BOOTSTRAP_ADMIN_PASSWORD
            - name: KC_DB
              value: postgres
            - name: KC_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_NAME
            - name: KC_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_HOST
            - name: KC_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_PORT
            - name: KC_DB_URL
              value: jdbc:postgresql://$(KC_DB_HOST):$(KC_DB_PORT)/$(KC_DB_NAME)
            - name: KC_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
            - name: KC_DB_SCHEMA
              value: public
            - name: KC_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: keycloak-config
                  key: KC_HOSTNAME
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_PORT
              value: "8082"
            - name: KC_HTTP_MANAGEMENT_PORT
              value: "9002"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /health/ready
              port: management
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: algohive
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: iam
    app.kubernetes.io/part-of: algohive
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: management
      port: 9002
      targetPort: 9002
      protocol: TCP
  type: ClusterIP
